apiVersion: v1
kind: Pod
metadata:
  name: pvc-copy-helper
spec:
  restartPolicy: Never
  containers:
    - name: helper
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: results
          mountPath: /mnt/results
  volumes:
    - name: results
      persistentVolumeClaim:
        claimName: adaptive-optimizers-results-pvc
