apiVersion: batch/v1
kind: Job
metadata:
  name: fig4c-k300-steps200-tuned-eta-0721
  namespace: tianhaowang-ucsd
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fig4c
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          env:
            - name: MPLBACKEND
              value: Agg
            - name: MPLCONFIGDIR
              value: /tmp/matplotlib
          resources:
            requests:
              cpu: "4"
              memory: "12Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "12Gi"
              nvidia.com/gpu: "1"
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              apt-get update
              apt-get install -y git
              pip install --no-cache-dir pandas matplotlib
              git clone https://github.com/RayyyyyQi/nrp-nautilus-workspace.git /workspace/nautilus
              cd /workspace/nautilus
              cp /opt/fig4c/run_multi_step.py experiments/fig4_wang2509/run_multi_step.py
              cp /opt/fig4c/plot_fig4.py experiments/fig4_wang2509/plot_fig4.py
              cp /opt/fig4c/plot_fig4c_high_precision.py experiments/fig4_wang2509/plot_fig4c_high_precision.py
              export PYTHONPATH=/workspace/nautilus

              OUT_DIR=/mnt/results/fig4_wang2509/7_21/nautilus/fig4c_K300_steps200_tuned_eta
              CSV="${OUT_DIR}/fig4c_K300_steps200_tuned_eta_nautilus.csv"
              mkdir -p "${OUT_DIR}"

              python -m experiments.fig4_wang2509.run_multi_step \
                --K 300 --L 60 --device cuda --steps 200 --stop-loss -1 \
                --eta-gd 54423.435483002722 \
                --eta-signgd 0.12 \
                --eta-muon 23.14986671851161 \
                --out "${CSV}"

              python -c "from experiments.fig4_wang2509.plot_fig4 import plot_multi_step; plot_multi_step('${CSV}','${OUT_DIR}/fig4c_K300_steps200_tuned_eta_normal_nautilus.png')"
              python experiments/fig4_wang2509/plot_fig4c_high_precision.py \
                --csv "${CSV}" \
                --out "${OUT_DIR}/fig4c_K300_steps200_tuned_eta_precision1e-16_nautilus.png" \
                --floor 1e-16
          volumeMounts:
            - name: results
              mountPath: /mnt/results
            - name: fig4c-code
              mountPath: /opt/fig4c
              readOnly: true
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: adaptive-optimizers-results-pvc
        - name: fig4c-code
          configMap:
            name: fig4c-k300-steps200-code-0721
