apiVersion: batch/v1
kind: Job
metadata:
  name: fig4-multi-step-final-rerun1
  namespace: tianhaowang-ucsd
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fig4-multi-step-final-rerun1
          image: python:3.11-slim
          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail

              apt-get update
              apt-get install -y git

              python -m pip install --upgrade pip
              pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch
              pip install --no-cache-dir pandas matplotlib

              cd /tmp
              git clone https://github.com/RayyyyyQi/nrp-nautilus-workspace.git repo
              cd repo

              mkdir -p /mnt/results/fig4_wang2509

              python -m experiments.fig4_wang2509.run_multi_step \
                --steps 2000 \
                --stop-loss 2e-2 \
                --eta-gd 250 \
                --eta-signgd 0.15 \
                --eta-muon 0.1 \
                --out /mnt/results/fig4_wang2509/multi_step_smoother36_nautilus_rerun1.csv

              python - <<'PY'
              from experiments.fig4_wang2509.plot_fig4 import plot_multi_step

              plot_multi_step(
                  "/mnt/results/fig4_wang2509/multi_step_smoother36_nautilus_rerun1.csv",
                  "/mnt/results/fig4_wang2509/fig4c_multi_step_smoother36_nautilus_rerun1.png",
              )
              PY

              ls -lh /mnt/results/fig4_wang2509
          volumeMounts:
            - name: results
              mountPath: /mnt/results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: adaptive-optimizers-results-pvc
