apiVersion: batch/v1
kind: Job
metadata:
  name: fig4b-one-step-algorithm-specific-0721
  namespace: tianhaowang-ucsd
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: experiment
          image: python:3.11-slim
          env:
            - name: MPLBACKEND
              value: Agg
            - name: MPLCONFIGDIR
              value: /tmp/matplotlib
          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              apt-get update
              apt-get install -y git
              python -m pip install --upgrade pip
              pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch
              pip install --no-cache-dir pandas matplotlib

              git clone https://github.com/RayyyyyQi/nrp-nautilus-workspace.git /workspace/nautilus
              cd /workspace/nautilus
              cp /opt/plotter/run_one_step.py experiments/fig4_wang2509/run_one_step.py
              cp /opt/plotter/plot_fig4.py experiments/fig4_wang2509/plot_fig4.py

              OUT_DIR=/mnt/results/fig4_wang2509/7_21/nautilus
              CSV="${OUT_DIR}/fig4b_one_step_algorithm_specific_eta_nautilus.csv"
              NORMAL="${OUT_DIR}/fig4b_one_step_algorithm_specific_eta_normal_nautilus.png"
              PRECISE="${OUT_DIR}/fig4b_one_step_algorithm_specific_eta_precision1e-16_nautilus.png"
              mkdir -p "${OUT_DIR}"

              python -m experiments.fig4_wang2509.run_one_step \
                --L 200 \
                --eta-gd 0.1 176450.66995904446 \
                --eta-signgd 1e-4 24.026490845046236 \
                --eta-muon 1e-4 44.13899202322823 \
                --num-etas 800 \
                --out "${CSV}"

              CSV="${CSV}" NORMAL="${NORMAL}" python -c \
                'import os; from experiments.fig4_wang2509.plot_fig4 import plot_one_step; plot_one_step(os.environ["CSV"], os.environ["NORMAL"])'

              python /opt/plotter/plot_fig4b_high_precision.py \
                --csv "${CSV}" \
                --out "${PRECISE}" \
                --floor 1e-16
          volumeMounts:
            - name: results
              mountPath: /mnt/results
            - name: plotter
              mountPath: /opt/plotter
              readOnly: true
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: adaptive-optimizers-results-pvc
        - name: plotter
          configMap:
            name: fig4b-algorithm-specific-code-0721
